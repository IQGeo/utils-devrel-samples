<VirtualHost *:80>
	
	ServerAdmin admin@iqgeo.cloud
	DocumentRoot /var/www/html

    ErrorLog /var/log/apache2/error.log
	CustomLog /var/log/apache2/access.log combined

	#Header set X-UA-Compatible: 	
	<Directory "/opt/iqgeo/platform/WebApps/">
    	WSGIProcessGroup iqgeo 
        Require all granted 
	</Directory>
	
    WSGIApplicationGroup %{GLOBAL}
	WSGIScriptAlias / /opt/iqgeo/platform/WebApps/myworldapp.wsgi
	WSGIDaemonProcess iqgeo threads=10 processes=2

</VirtualHost>
